<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{/include/header :: header}"></head>

<body>
    <div th:replace="~{/include/body-header :: bodyHeader}"></div>

    <div class="container">
        <div class="pg-opt">
            <div class="row">
                <div class="col-md-6 pc">
                    <h2>
                        <span th:text="#{SIGN_IN}">로그인</span>
                        <small style="color:red" th:if="${param.error != null}" th:text="#{LOGIN_FAILED}">
                            아이디 또는 비밀번호를 확인하세요.
                        </small>
                        <small style="color:green" th:if="${param.logout != null}" th:text="#{LOGOUT_SUCCESS}">
                            로그아웃되었습니다.
                        </small>
                    </h2>
                </div>
                <div class="col-md-6">
                    <ol class="breadcrumb">
                        <li th:text="#{MEMBER}">회원</li>
                        <li class="active" th:text="#{SIGN_IN}">로그인</li>
                    </ol>
                </div>
            </div>
        </div>

        <div class="content">
            <div sec:authorize="isAnonymous()">
                <form th:action="@{/member/login}" method="post" class="form-horizontal">
                    <div class="form-group">
                        <label class="control-label col-sm-2" for="id" th:text="#{MEMBER_ID}">사용자 아이디</label>
                        <div class="col-sm-8">
                            <input type="text" name="userid" id="id" class="form-control"
                                   th:placeholder="#{MEMBER_ID}">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="control-label col-sm-2" for="pw" th:text="#{MEMBER_PW}">비밀번호</label>
                        <div class="col-sm-8">
                            <input type="password" name="password" id="pw" class="form-control"
                                   th:placeholder="#{MEMBER_PW}">
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="col-sm-offset-2 col-sm-8">
                            <input type="submit" class="btn btn-info" th:value="#{SIGN_IN}">
                            <input type="reset" class="btn btn-info" th:value="#{CANCEL}">
                            <a th:href="@{/member/insert}" class="btn btn-success" th:text="#{INSERT_USER_INFO}">
                                회원 가입
                            </a>
                        </div>
                    </div>
                </form>
            </div>

            <div sec:authorize="isAuthenticated()">
                <h4 sec:authentication="name">userid</h4>
                [<a th:href="@{/member/update}" th:text="#{UPDATE_USER_INFO}">개인정보 수정</a>]
                [<a th:href="@{/member/logout}" th:text="#{SIGN_OUT}">로그아웃</a>]
                [<a th:href="@{/member/delete}" th:text="#{EXIT_MEMBER}">회원 탈퇴</a>]
            </div>
        </div>
    </div>

    <footer th:replace="~{/include/footer :: footer}"></footer>
</body>
</html>
